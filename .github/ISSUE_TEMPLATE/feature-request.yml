name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: searched
    attributes:
      label: Before submitting
      options:
        - label: I have checked the in-app Help Guide (? icon in the top bar)
          required: true
        - label: I have searched existing issues to make sure this has not already been requested
          required: true
  - type: dropdown
    id: category
    attributes:
      label: Feature category
      options:
        - New AI model support
        - Extension building
        - Website building
        - Editing and improving
        - User interface
        - Language and localization
        - Import and export
        - Browser compatibility
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: Why would this feature be useful? What problem does it solve?
    validations:
      required: false
